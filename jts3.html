<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>IG等級穩定分享版</title>

<script src="https://cdn.jsdelivr.net/npm/dom-to-image-more@3.3.0/dist/dom-to-image-more.min.js"></script>

<style>
  body { font-family: Arial; margin: 0; }

  .box {
    height: 600px;
    border: 1px solid #000;
    margin: 20px;
    padding: 20px;
  }

  button {
    padding: 12px;
    margin: 10px;
    font-size: 16px;
  }

  /* 🔥 freeze 用（截圖時防跳動） */
  .freeze * {
    transition: none !important;
    animation: none !important;
  }

  #preview {
    max-width: 100%;
    border: 1px solid #ccc;
  }
</style>
</head>
<body>

<h2>IG 等級穩定分享</h2>

<div id="captureArea">

  <div class="box">
    區塊1<br>
    <img src="https://picsum.photos/300/200">
  </div>

  <div class="box">
    區塊2<br>
    <img src="https://picsum.photos/301/200">
  </div>

  <div class="box">
    區塊3<br>
    <img src="https://picsum.photos/302/200">
  </div>

</div>

<button onclick="share()">📤 一鍵分享（IG等級）</button>

<br><br>
<img id="preview">

<script>

let isProcessing = false;

// 等畫面穩定
function waitStable() {
  return new Promise(r => {
    requestAnimationFrame(() => {
      requestAnimationFrame(r);
    });
  });
}

// ❌ 不再 fetch 圖片（關鍵修正）
function lockImages(clone) {
  const imgs = clone.querySelectorAll("img");

  imgs.forEach(img => {
    // 🔥 關鍵：禁止重新載入
    img.crossOrigin = "anonymous";
    img.decoding = "sync";
  });
}

// 等圖片載入完成（只等，不改）
async function waitImages(el) {
  const imgs = el.querySelectorAll("img");

  await Promise.all([...imgs].map(img => {
    if (img.complete) return;
    return new Promise(r => {
      img.onload = img.onerror = r;
    });
  }));
}

async function share() {

  if (isProcessing) return;
  isProcessing = true;

  try {

    const node = document.getElementById("captureArea");

    // 1️⃣ 等圖片載入完成（當下畫面）
    await waitImages(node);

    // 2️⃣ 等 render 穩定
    await waitStable();

    // 3️⃣ clone（快照）
    const clone = node.cloneNode(true);

    clone.style.position = "fixed";
    clone.style.left = "-10000px";
    clone.style.top = "0";
    clone.style.background = "#fff";

    document.body.appendChild(clone);

    // 4️⃣ 不重抓圖，只鎖住狀態
    lockImages(clone);

    // 5️⃣ 等 clone render
    await waitStable();

    // 6️⃣ 直接截圖（不 fetch、不轉 base64）
    const blob = await domtoimage.toBlob(clone, {
      bgcolor: "#ffffff",
      cacheBust: false,   // 🔥 關鍵：禁止 cache 變動
      width: clone.scrollWidth,
      height: clone.scrollHeight
    });

    document.body.removeChild(clone);

    // 7️⃣ 分享
    const file = new File([blob], "page.png", { type: "image/png" });

    await navigator.share?.({
      files: [file],
      title: "分享"
    });

  } catch (e) {
    console.error(e);
    alert("截圖失敗");
  }

  isProcessing = false;
}

</script>
