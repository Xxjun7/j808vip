<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>整頁轉圖片（無閃動分享版）</title>

<script src="https://cdn.jsdelivr.net/npm/dom-to-image-more@3.3.0/dist/dom-to-image-more.min.js"></script>

<style>
  body { font-family: Arial; }

  .box {
    height: 600px;
    border: 1px solid #000;
    margin: 20px;
    padding: 20px;
  }

  button {
    padding: 10px;
    margin: 5px;
  }
</style>
</head>
<body>

<h2>IG 等級整頁分享（穩定版）</h2>

<div id="captureArea">

  <div class="box">
    區塊1<br>
    <img src="https://picsum.photos/300/200">
  </div>

  <div class="box">
    區塊2<br>
    <img src="https://picsum.photos/301/200">
  </div>

  <div class="box">
    區塊3<br>
    <img src="https://picsum.photos/302/200">
  </div>

</div>

<button onclick="share()">📤 直接分享整頁</button>

<br><br>
<img id="preview" style="max-width:100%; border:1px solid #ccc;">

<script>

let isProcessing = false;

// 把圖片轉 base64（只作用在 clone，不污染畫面）
async function convertImagesInClone(clone) {

  const imgs = clone.querySelectorAll("img");

  await Promise.all([...imgs].map(async img => {
    try {
      const res = await fetch(img.src);
      const blob = await res.blob();

      const reader = new FileReader();
      const base64 = await new Promise(resolve => {
        reader.onloadend = () => resolve(reader.result);
        reader.readAsDataURL(blob);
      });

      img.src = base64;

    } catch (e) {
      console.warn("圖片轉換失敗:", img.src);
    }
  }));
}

// 等圖片載入完成（clone）
async function waitImages(clone) {
  const imgs = clone.querySelectorAll("img");

  await Promise.all([...imgs].map(img => {
    if (img.complete) return;
    return new Promise(resolve => {
      img.onload = img.onerror = resolve;
    });
  }));
}

// 🚀 直接分享（核心）
async function share() {

  if (isProcessing) return;
  isProcessing = true;

  try {

    const node = document.getElementById("captureArea");

    // 1️⃣ 複製 DOM（關鍵：不影響畫面）
    const clone = node.cloneNode(true);

    // 2️⃣ 丟到畫面外（不可見）
    clone.style.position = "fixed";
    clone.style.left = "-10000px";
    clone.style.top = "0";
    clone.style.background = "#fff";

    document.body.appendChild(clone);

    // 3️⃣ 處理圖片（只影響 clone）
    await convertImagesInClone(clone);

    // 4️⃣ 等圖片載入
    await waitImages(clone);

    // 5️⃣ 截圖
    const blob = await domtoimage.toBlob(clone, {
      bgcolor: "#ffffff",
      width: clone.scrollWidth,
      height: clone.scrollHeight
    });

    // 6️⃣ 移除 clone
    document.body.removeChild(clone);

    // 7️⃣ 預覽（可刪）
    const url = URL.createObjectURL(blob);
    document.getElementById("preview").src = url;

    // 8️⃣ 分享
    const file = new File([blob], "page.png", { type: "image/png" });

    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        files: [file],
        title: "整頁截圖"
      });
    } else {
      alert("此裝置不支援分享");
    }

  } catch (err) {
    console.error(err);
    alert("截圖失敗");
  }

  isProcessing = false;
}

</script>

</body>
</html>
