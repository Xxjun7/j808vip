<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>整頁轉圖片（直接分享版）</title>

<script src="https://cdn.jsdelivr.net/npm/dom-to-image-more@3.3.0/dist/dom-to-image-more.min.js"></script>

<style>
  body { font-family: Arial; }
  .box {
    height: 600px;
    border: 1px solid #000;
    margin: 20px;
    padding: 20px;
  }
  button { padding: 10px; margin: 5px; }
</style>
</head>
<body>

<h2>IG 等級整頁截圖</h2>

<div id="captureArea">

  <div class="box">
    區塊1<br>
    <img src="https://picsum.photos/300/200">
  </div>

  <div class="box">
    區塊2<br>
    <img src="https://picsum.photos/301/200">
  </div>

  <div class="box">
    區塊3<br>
    <img src="https://picsum.photos/302/200">
  </div>

</div>

<button onclick="share()">📤 直接分享整頁</button>

<br><br>
<img id="preview" style="max-width:100%; border:1px solid #ccc;">

<script>

let isProcessing = false;

// 強制圖片轉 base64（解決跨域）
async function fixImages() {
  const imgs = document.querySelectorAll("#captureArea img");

  await Promise.all([...imgs].map(async img => {
    try {
      const res = await fetch(img.src);
      const blob = await res.blob();

      const reader = new FileReader();
      const base64 = await new Promise(r => {
        reader.onloadend = () => r(reader.result);
        reader.readAsDataURL(blob);
      });

      img.src = base64;
    } catch (e) {
      console.warn("圖片轉換失敗:", img.src);
    }
  }));
}

// 核心：產生圖片
async function generateImage() {

  const node = document.getElementById("captureArea");

  // 1️⃣ 修圖片
  await fixImages();

  // 2️⃣ 等載入
  await Promise.all(
    [...node.querySelectorAll("img")].map(img => {
      if (img.complete) return;
      return new Promise(r => img.onload = img.onerror = r);
    })
  );

  // 3️⃣ 轉圖
  const blob = await domtoimage.toBlob(node, {
    quality: 1,
    bgcolor: "#ffffff",
    width: node.scrollWidth,
    height: node.scrollHeight
  });

  return blob;
}

// 一鍵分享（自動截圖）
async function share() {

  if (isProcessing) return;
  isProcessing = true;

  try {
    const blob = await generateImage();

    // 預覽（可刪）
    const url = URL.createObjectURL(blob);
    document.getElementById("preview").src = url;

    const file = new File([blob], "page.png", { type: "image/png" });

    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        files: [file],
        title: "整頁截圖",
      });
    } else {
      alert("此裝置不支援分享，請改用下載");
    }

  } catch (err) {
    console.error(err);
    alert("截圖失敗");
  }

  isProcessing = false;
}

</script>

</body>
</html>
