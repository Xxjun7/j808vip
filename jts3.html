<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>商用級穩定分享系統</title>

<script src="https://cdn.jsdelivr.net/npm/dom-to-image-more@3.3.0/dist/dom-to-image-more.min.js"></script>

<style>
body { font-family: Arial; }

.box {
  height: 600px;
  border: 1px solid #000;
  margin: 20px;
  padding: 20px;
}

button {
  padding: 12px;
  margin: 10px;
  font-size: 16px;
}

.freeze * {
  transition: none !important;
  animation: none !important;
}
</style>
</head>
<body>

<h2>🔥 商用級 IG 穩定分享</h2>

<div id="captureArea">

  <div class="box">
    區塊1<br>
    <img src="https://picsum.photos/300/200">
  </div>

  <div class="box">
    區塊2<br>
    <img src="https://picsum.photos/301/200">
  </div>

  <div class="box">
    區塊3<br>
    <img src="https://picsum.photos/302/200">
  </div>

</div>

<button onclick="share()">📤 一鍵分享（商用穩定）</button>

<br><br>
<img id="preview" style="max-width:100%; border:1px solid #ccc;">

<script>

let isReady = false;
let isProcessing = false;

/* =========================
   🔥 ① 頁面載入：鎖定所有圖片
   ========================= */
async function lockAllImages() {

  const imgs = document.querySelectorAll("#captureArea img");

  await Promise.all([...imgs].map(async (img) => {

    try {
      const res = await fetch(img.src);
      const blob = await res.blob();

      const base64 = await new Promise(resolve => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.readAsDataURL(blob);
      });

      // 🔥 關鍵：永久鎖定，不再變動
      img.dataset.locked = "true";
      img.src = base64;

    } catch (e) {
      console.warn("鎖圖失敗:", img.src);
    }
  }));

  isReady = true;
}

/* =========================
   等 render 穩定
   ========================= */
function waitStable() {
  return new Promise(r => {
    requestAnimationFrame(() => {
      requestAnimationFrame(r);
    });
  });
}

/* =========================
   🚀 ② 商用級分享（純 snapshot）
   ========================= */
async function share() {

  if (isProcessing) return;
  isProcessing = true;

  try {

    if (!isReady) {
      await lockAllImages();
    }

    const node = document.getElementById("captureArea");

    await waitStable();

    // freeze UI（避免動畫變動）
    document.body.classList.add("freeze");

    // clone snapshot
    const clone = node.cloneNode(true);

    clone.style.position = "fixed";
    clone.style.left = "-10000px";
    clone.style.top = "0";
    clone.style.background = "#fff";

    document.body.appendChild(clone);

    await waitStable();

    const blob = await domtoimage.toBlob(clone, {
      bgcolor: "#ffffff",
      cacheBust: false,
      width: clone.scrollWidth,
      height: clone.scrollHeight
    });

    document.body.removeChild(clone);
    document.body.classList.remove("freeze");

    const url = URL.createObjectURL(blob);
    document.getElementById("preview").src = url;

    const file = new File([blob], "share.png", { type: "image/png" });

    if (navigator.canShare?.({ files: [file] })) {
      await navigator.share({
        files: [file],
        title: "分享內容"
      });
    } else {
      alert("此裝置不支援分享");
    }

  } catch (e) {
    console.error(e);
    alert("分享失敗");
  }

  isProcessing = false;
}

/* =========================
   🔥 初始化（關鍵）
   ========================= */
window.addEventListener("load", lockAllImages);

</script>

</body>
</html>
