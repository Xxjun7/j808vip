<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>整頁截圖測試</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image/2.6.0/dom-to-image.min.js"></script>

<style>
  body { font-family: Arial; }
  .section {
    height: 600px;
    border: 1px solid #000;
    margin: 20px;
    padding: 20px;
  }
  img { width: 300px; }
  button { margin: 5px; padding: 10px; }
</style>
</head>
<body>

<h2>整頁截圖測試（含滾動）</h2>

<div class="section">區塊1<br><img src="https://picsum.photos/300/200"></div>
<div class="section">區塊2<br><img src="https://picsum.photos/301/200"></div>
<div class="section">區塊3<br><img src="https://picsum.photos/302/200"></div>

<!-- 方法1 -->
<button onclick="method1()">方法1：html2canvas整頁</button>

<!-- 方法2 -->
<button onclick="method2()">方法2：html2canvas + scroll修正</button>

<!-- 方法3 -->
<button onclick="method3()">方法3：dom-to-image整頁</button>

<!-- 方法4 -->
<button onclick="method4()">方法4：分段截圖再合成</button>

<!-- 方法5 -->
<button onclick="method5()">方法5：直接截documentElement</button>

<!-- 方法6 -->
<button onclick="method6()">方法6：瀏覽器列印PDF</button>

<script>

// 方法1（基本整頁）
function method1() {
  html2canvas(document.body).then(canvas => {
    download(canvas, 'm1_basic.png');
  });
}

// 方法2（強制整頁高度）
function method2() {
  html2canvas(document.body, {
    scrollY: -window.scrollY,
    windowHeight: document.body.scrollHeight
  }).then(canvas => {
    download(canvas, 'm2_full.png');
  });
}

// 方法3 dom-to-image
function method3() {
  domtoimage.toPng(document.body)
    .then(dataUrl => downloadURL(dataUrl, 'm3_dom.png'));
}

// 方法4 分段截圖（最接近真整頁）
async function method4() {
  const totalHeight = document.body.scrollHeight;
  const viewHeight = window.innerHeight;
  let y = 0;

  const finalCanvas = document.createElement('canvas');
  finalCanvas.width = window.innerWidth;
  finalCanvas.height = totalHeight;
  const ctx = finalCanvas.getContext('2d');

  while (y < totalHeight) {
    window.scrollTo(0, y);
    await new Promise(r => setTimeout(r, 300));

    const canvas = await html2canvas(document.body);
    ctx.drawImage(canvas, 0, y);

    y += viewHeight;
  }

  window.scrollTo(0, 0);
  download(finalCanvas, 'm4_stitch.png');
}

// 方法5 documentElement
function method5() {
  html2canvas(document.documentElement).then(canvas => {
    download(canvas, 'm5_html.png');
  });
}

// 方法6
function method6() {
  window.print();
}

// 下載
function download(canvas, name) {
  const a = document.createElement('a');
  a.download = name;
  a.href = canvas.toDataURL();
  a.click();
}

function downloadURL(url, name) {
  const a = document.createElement('a');
  a.href = url;
  a.download = name;
  a.click();
}

</script>

</body>
</html>
