  function isLineBrowser() {
    return navigator.userAgent.includes("Line");
  }

  // 當頁面載入時，嘗試檢查是否來自 LINE 瀏覽器
  window.onload = function() {
    if (isLineBrowser()) {
      // 如果是 LINE 瀏覽器，稍等 1 秒後自動跳轉
      setTimeout(function() {
        // 嘗試用 window.location 開啟目標網址，這會觸發外部瀏覽器開啟
        window.location.href = "https://xxjun7.github.io/j808vip/";
      }, 500);
    }
  }

  }

  function capture() {
    // 截圖邏輯
  }

  function copyCode() {

</script>
