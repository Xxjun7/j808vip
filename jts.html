<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Product Share Component</title>

<script src="https://cdn.jsdelivr.net/npm/dom-to-image-more@3.3.0/dist/dom-to-image-more.min.js"></script>

<style>
body { font-family: Arial; }

.box {
  height: 600px;
  border: 1px solid #000;
  margin: 20px;
  padding: 20px;
}

/* loading overlay */
#loading {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  justify-content: center;
  align-items: center;
  color: #fff;
  font-size: 18px;
  z-index: 9999;
}

.freeze * {
  transition: none !important;
  animation: none !important;
}

button {
  padding: 12px;
  margin: 10px;
  font-size: 16px;
}
</style>
</head>
<body>

<div id="loading">生成分享圖片中...</div>

<h2>產品級分享元件</h2>

<div id="captureArea">

  <div class="box">
    區塊1<br>
    <img src="https://picsum.photos/300/200">
  </div>

  <div class="box">
    區塊2<br>
    <img src="https://picsum.photos/301/200">
  </div>

  <div class="box">
    區塊3<br>
    <img src="https://picsum.photos/302/200">
  </div>

</div>

<button onclick="ShareComponent.share()">📤 分享</button>

<script>

const ShareComponent = {

  isReady: false,
  isProcessing: false,

  /* =========================
     初始化（只做一次）
  ========================= */
  async init() {
    const imgs = document.querySelectorAll("#captureArea img");

    await Promise.all([...imgs].map(async (img) => {
      try {
        const res = await fetch(img.src);
        const blob = await res.blob();

        const base64 = await new Promise(resolve => {
          const reader = new FileReader();
          reader.onloadend = () => resolve(reader.result);
          reader.readAsDataURL(blob);
        });

        img.src = base64;

      } catch (e) {
        console.warn("image lock failed:", img.src);
      }
    }));

    this.isReady = true;
  },

  /* =========================
     等畫面穩定
  ========================= */
  waitStable() {
    return new Promise(r => {
      requestAnimationFrame(() => {
        requestAnimationFrame(r);
      });
    });
  },

  /* =========================
     fallback download
  ========================= */
  download(blob) {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "share.png";
    a.click();
  },

  /* =========================
     主分享 API
  ========================= */
  async share() {

    if (this.isProcessing) return;
    this.isProcessing = true;

    document.getElementById("loading").style.display = "flex";

    try {

      if (!this.isReady) {
        await this.init();
      }

      const node = document.getElementById("captureArea");

      await this.waitStable();

      document.body.classList.add("freeze");

      const clone = node.cloneNode(true);

      clone.style.position = "fixed";
      clone.style.left = "-10000px";
      clone.style.top = "0";
      clone.style.background = "#fff";

      document.body.appendChild(clone);

      await this.waitStable();

      const blob = await domtoimage.toBlob(clone, {
        bgcolor: "#ffffff",
        cacheBust: false,
        width: clone.scrollWidth,
        height: clone.scrollHeight
      });

      document.body.removeChild(clone);
      document.body.classList.remove("freeze");

      const file = new File([blob], "share.png", { type: "image/png" });

      if (navigator.canShare?.({ files: [file] })) {

        await navigator.share({
          files: [file],
          title: "分享內容"
        });

      } else {
        this.download(blob);
      }

    } catch (err) {
      console.error(err);
      alert("分享失敗，已改下載");

    } finally {
      document.getElementById("loading").style.display = "none";
      this.isProcessing = false;
    }
  }
};

</script>

</body>
</html>
