<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>圖片存檔測試</title>
<style>
  body { font-family: Arial; text-align: center; padding: 20px; }
  img { max-width: 300px; display: block; margin: 20px auto; }
  button, a {
    margin: 5px;
    padding: 10px 15px;
    cursor: pointer;
  }
</style>
</head>
<body>

<h2>圖片存檔測試</h2>

<img id="testImg" src="https://picsum.photos/400/300" alt="測試圖片">

<!-- 方法1：download 屬性 -->
<a href="https://picsum.photos/400/300" download="image1.jpg">
  <button>方法1：直接下載(download)</button>
</a>

<!-- 方法2：JS 建立 a 下載 -->
<button onclick="downloadImage()">方法2：JS下載</button>

<!-- 方法3：Canvas 轉換下載 -->
<button onclick="downloadCanvas()">方法3：Canvas下載</button>

<!-- 方法4：右鍵提示 -->
<button onclick="alert('請對圖片按右鍵另存')">方法4：提示右鍵</button>

<!-- 方法5：開新分頁 -->
<button onclick="openNewTab()">方法5：新分頁開啟</button>

<!-- 方法6：fetch 轉 blob -->
<button onclick="fetchDownload()">方法6：fetch下載</button>

<script>
const imgUrl = "https://picsum.photos/400/300";

// 方法2
function downloadImage() {
  const a = document.createElement('a');
  a.href = imgUrl;
  a.download = 'image2.jpg';
  a.click();
}

// 方法3
function downloadCanvas() {
  const img = document.getElementById('testImg');
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');

  canvas.width = img.naturalWidth;
  canvas.height = img.naturalHeight;

  ctx.drawImage(img, 0, 0);

  const a = document.createElement('a');
  a.download = 'image3.png';
  a.href = canvas.toDataURL();
  a.click();
}

// 方法5
function openNewTab() {
  window.open(imgUrl, '_blank');
}

// 方法6
function fetchDownload() {
  fetch(imgUrl)
    .then(res => res.blob())
    .then(blob => {
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'image4.jpg';
      a.click();
      window.URL.revokeObjectURL(url);
    });
}
</script>

</body>
</html>
