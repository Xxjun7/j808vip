<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>頁面截圖下載</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 20px;
      background-color: #f4f4f9;
    }
    .capture {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #007bff;
      color: white;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      transition: background-color 0.3s;
    }
    .capture:hover {
      background-color: #0056b3;
    }
    .content {
      margin-top: 20px;
      padding: 20px;
      border: 1px solid #ccc;
      background: #ffffff;
    }
    h1 {
      color: #333;
    }
  </style>
</head>
<body>

  <button class="capture">📸 下載頁面截圖</button>

  <div class="content">
    <h1>這是測試內容</h1>
    <p>這段文字會顯示在截圖中。</p>
    <p>背景色、字型樣式也會被保留。</p>
  </div>

  <!-- 引入 html2canvas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/0.4.1/html2canvas.min.js"></script>

  <script>
    document.querySelector('.capture').onclick = function() {
      html2canvas(document.body).then(function(canvas) {
        canvas.toBlob(function(blob) {
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = '頁面截圖.png';
          a.click();
        });
      });
    };
  </script>

</body>
</html>
