<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>頁面截圖下載</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 20px;
      background-color: #f4f4f9;
    }
    .capture {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #007bff;
      color: white;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      transition: background-color 0.3s;
    }
    .capture:hover {
      background-color: #0056b3;
    }
    .content {
      margin-top: 20px;
      padding: 20px;
      border: 1px solid #ccc;
      background: #ffffff;
    }
    h1 {
      color: #333;
    }
  </style>
</head>
<body>

  <button class="capture">📸 下載頁面截圖3</button>

  <div class="content">
    <h1>這是測試內容</h1>
    <p>這段文字會顯示在截圖中。</p>
    <p>背景色、字型樣式也會被保留。</p>
  </div>

  <!-- 使用最新版 html2canvas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <script>
    document.querySelector('.capture').addEventListener('click', () => {
      html2canvas(document.body, {
        useCORS: true,          // 開啟跨域支持
        scrollY: -window.scrollY // 修正滾動
      }).then(canvas => {
        canvas.toBlob(blob => {
          // 確保創建 Blob 對象
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = '頁面截圖.png';
          document.body.appendChild(a); // 添加到 DOM
          a.click();  // 觸發點擊下載
          document.body.removeChild(a); // 下載後移除
        });
      }).catch(err => {
        console.error('截圖過程發生錯誤:', err);
      });
    });
  </script>

</body>
</html>
